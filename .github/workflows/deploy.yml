name: Deploy POS O-JERUK

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build server
        working-directory: server
        run: |
          npm ci
          npm run build

      - name: Build client
        working-directory: client
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Run DB migration
        working-directory: server
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Restart PM2
        run: |
          pm2 restart pos-ojeruk 2>/dev/null || pm2 start server/dist/server.js --name pos-ojeruk
          pm2 save
          pm2 status
