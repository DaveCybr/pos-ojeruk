name: Deploy POS O-JERUK

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build Server ──────────────────────────────────────────
      - name: Build Server
        working-directory: server
        run: |
          npm ci
          npm run build

      # ── Build Client ──────────────────────────────────────────
      - name: Build Client
        working-directory: client
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL }}
        run: |
          echo "VITE_API_URL=$VITE_API_URL" > .env
          echo "VITE_SOCKET_URL=$VITE_SOCKET_URL" >> .env
          npm install --legacy-peer-deps
          npm run build

      # ── Deploy Server ─────────────────────────────────────────
      - name: Deploy Server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        run: |
          API_PATH=/home/satelliteorbit/api/pos-ojeruk
          mkdir -p $API_PATH

          # Tulis .env dari secrets
          cat > $API_PATH/.env << ENVEOF
          DATABASE_URL=$DATABASE_URL
          JWT_SECRET=$JWT_SECRET
          JWT_REFRESH_SECRET=$JWT_REFRESH_SECRET
          PORT=3000
          CLIENT_URL=${{ secrets.VITE_SOCKET_URL }}
          NODE_ENV=production
          ENVEOF

          # Copy hasil build
          rm -rf $API_PATH/dist $API_PATH/prisma
          cp -r server/dist    $API_PATH/dist
          cp -r server/prisma  $API_PATH/prisma
          cp server/package.json      $API_PATH/package.json
          cp server/package-lock.json $API_PATH/package-lock.json

          cd $API_PATH
          npm ci --omit=dev
          npx prisma generate
          npx prisma migrate deploy

          pm2 restart pos-ojeruk 2>/dev/null || pm2 start dist/server.js --name pos-ojeruk
          pm2 save

      # ── Deploy Client ─────────────────────────────────────────
      - name: Deploy Client
        run: |
          WEB_PATH=/home/satelliteorbit/domains/ojeruk.satelliteorbit.cloud/public_html
          find $WEB_PATH -mindepth 1 -not -name '.htaccess' -delete
          cp -r client/dist/* $WEB_PATH/

          echo ">>> DEPLOY SUCCESSFUL!"
          pm2 status
