name: Deploy POS O-JERUK

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd ~/pos-ojeruk
          git pull origin main

      - name: Build server
        run: |
          cd ~/pos-ojeruk/server
          npm ci
          npm run build

      - name: Build client
        run: |
          cd ~/pos-ojeruk/client
          npm install --legacy-peer-deps
          npm run build

      - name: Run DB migration
        run: |
          cd ~/pos-ojeruk/server
          npx prisma generate
          npx prisma migrate deploy

      - name: Restart PM2
        run: |
          pm2 restart pos-ojeruk
          pm2 save
          pm2 status
